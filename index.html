<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bananalution!</title>
    <style>
        /* Reset body margins and use flexbox to center the content */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            /* Make the body take up the full viewport height */
            display: flex;
            justify-content: center;
            /* Center horizontally */
            align-items: center;
            /* Center vertically */
            background-color: #3c3c3c;
            /* Optional: dark background outside the canvas */

        }

        canvas {
            display: block;
            image-rendering: pixelated;
            /* Keeps pixel art crisp */
            image-rendering: crisp-edges;
            margin: 0 auto;
        }
    </style>
</head>
